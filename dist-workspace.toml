[workspace]
members = ["cargo:./"]

[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = ["homebrew"]
tap = "MoonMao42/homebrew-tap"
publish-jobs = ["homebrew"]
allow-dirty = ["ci"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-gnu",
]
