[theme.palette]
# Schoonover canonical: foreground = base0, background = base03
foreground = "#839496"
background = "#002b36"
cursor = "#cb4b16"
selection_bg = "#073642"
selection_fg = "#839496"
# brand_accent = Solarized violet (.3 — locked on both variants)
brand_accent = "#6c71c4"
# ANSI normals — WCAG-repaired per RESEARCH §6 (canonical preserved in [theme.palette.extras] below)
# WCAG repair: canonical was #073642 (base02, 1.15:1), raised to #a0a0a0 (6.92:1) per Catppuccin Frappé/Macchiato precedent
black = "#a0a0a0"
# WCAG repair: canonical was #dc322f (3.25:1), raised to #ea6e60 (5.07:1)
red = "#ea6e60"
green = "#859900"
yellow = "#b58900"
# WCAG repair: canonical was #268bd2 (4.08:1), raised to #5fafee (6.33:1)
blue = "#5fafee"
# WCAG repair: canonical was #d33682 (3.30:1), raised to #e16ba5 (4.90:1)
magenta = "#e16ba5"
cyan = "#2aa198"
white = "#eee8d5"
# ANSI brights — canonical Schoonover (no audit pressure)
bright_black = "#586e75"
bright_red = "#cb4b16"
bright_green = "#586e75"
bright_yellow = "#657b83"
bright_blue = "#839496"
bright_magenta = "#6c71c4"
bright_cyan = "#93a1a1"
bright_white = "#fdf6e3"
# Background variants — Solarized's base hierarchy is INVERTED relative to slate's
# bg_dim/bg_darker/bg_darkest naming convention (base00 is mid-gray, NOT the darkest
# tone). Anchor bg_darkest at base03 (== background) so starship `crust` and the
# adaptive `powerline_fg` resolve to crisp dark teal rather than mid-gray, which
# made pill text wash out against bright accent segments.
bg_dim = "#073642"
bg_darker = "#002b36"
bg_darkest = "#002b36"
# Extended adapter-coverage palette per RESEARCH §5 / Override #3
text = "#839496"
mauve = "#6c71c4"
overlay1 = "#586e75"

[theme.palette.extras]
# Canonical Schoonover hex preserved for fidelity-curious consumers (advisory; not read at runtime)
canonical_red = "#dc322f"
canonical_blue = "#268bd2"
canonical_magenta = "#d33682"
canonical_yellow = "#b58900"
canonical_green = "#859900"
canonical_cyan = "#2aa198"
canonical_orange = "#cb4b16"
canonical_violet = "#6c71c4"
# Functional: read by starship "peach" segment fallback chain (src/adapter/starship.rs:77-100)
orange = "#cb4b16"

